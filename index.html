<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image to PDF</title>
</head>
<body>
    <h1>Image to PDF Converter</h1>
    <p>Print a square image, like a QR code, in various sizes on one piece of paper.</p>
    
    <input type="file" id="imageInput" accept="image/*">
    <br />
    <br />
    
    <select id="paperSize">
        <option value="letter">Letter (8.5" x 11")</option>
        <option value="a4">A4 (210mm x 297mm)</option>
    </select>
    <br />
    <br />

    <button id="generateBtn">Download PDF</button>

    <script type="module" src="generate.js"></script>
</body>
</html>
