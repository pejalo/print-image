<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image to PDF</title>
  <script type="module" crossorigin src="./assets/index-BNENDOWM.js"></script>
</head>
<body>
    <h1>Image to PDF Converter</h1>

    <p>Print a square image, like a QR code, in various sizes on one piece of paper.</p>

    <p><a href="https://github.com/pejalo/print-image">GitHub</a></p>
    
    <fieldset>
        <p>
            <input type="file" id="imageInput" accept="image/*">
        </p>
        <p>
            <select id="paperSize">
                <option value="letter">Letter (8.5" x 11")</option>
                <option value="a4">A4 (210mm x 297mm)</option>
            </select>
        </p>
        <p>
            <button id="generateBtn">Download PDF</button>
        </p>
    </fieldset>

</body>
</html>
